<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Redefinir senha — PigBank</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/png" href="/favicon.png?v=2" />
<link rel="apple-touch-icon" href="/brand/apple-touch-icon.png?v=2" />
<meta name="theme-color" content="#0c0c0d" />
<link rel="stylesheet" href="/brand.css?v=2" />
<link rel="stylesheet" href="/site.css?v=2" />
<style>
  .auth-error { display: none; background: rgba(255,45,45,.1); border: 1px solid rgba(255,45,45,.3); color: #ffb4b4; padding: 10px 13px; border-radius: 10px; font-size: .82rem; margin-bottom: 14px; line-height: 1.4; }
  .auth-error.show { display: block; }
  .strength { margin-top: 9px; }
  .strength-bar { height: 5px; background: var(--line-2); border-radius: 3px; overflow: hidden; }
  .strength-fill { height: 100%; width: 0; border-radius: 3px; transition: width .2s, background .2s; }
  .strength-label { font-size: .74rem; margin-top: 6px; display: inline-block; font-weight: 600; }
  .success-state { display: none; text-align: center; }
  .success-state .success-icon { font-size: 3rem; margin-bottom: 12px; }
  .back { display: inline-block; text-align: center; width: 100%; color: var(--ink-3); font-size: .84rem; margin-top: 18px; }
  .back:hover { color: var(--pink); }
</style>
</head>
<body>
<div class="glow"></div>

  <nav class="nav">
    <a class="nav-logo" href="/"><img class="logo-badge" src="/brand/avatar.webp" alt="" /><span>PigBank</span></a>
    <div class="nav-right"><a class="link-entrar" href="/login">Entrar</a></div>
  </nav>

  <div class="wrap auth-wrap">
    <div class="auth-card">
      <div class="auth-logo"><img src="/brand/avatar.webp" alt="" /><span>PigBank</span></div>

      <!-- Formulário -->
      <div id="form-state">
        <h1>Nova senha</h1>
        <p class="auth-sub">Digite sua nova senha. O link expira em 30 minutos.</p>
        <div class="auth-error" id="msg-error"></div>
        <form id="reset-form">
          <div class="field">
            <label for="password">Nova senha</label>
            <input type="password" id="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required />
            <div class="strength">
              <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
              <span class="strength-label" id="strength-label"></span>
            </div>
          </div>
          <div class="field">
            <label for="password2">Confirmar nova senha</label>
            <input type="password" id="password2" placeholder="Repita a senha" autocomplete="new-password" required />
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">Redefinir senha</button>
        </form>
        <a href="/login" class="back">← Voltar para o login</a>
      </div>

      <!-- Sucesso -->
      <div class="success-state" id="success-state">
        <div class="success-icon">✅</div>
        <h1>Senha redefinida!</h1>
        <p class="auth-sub">Sua senha foi alterada com sucesso. Agora você pode entrar com a nova senha.</p>
        <a href="/login" class="btn btn-primary btn-block btn-lg" style="margin-top:10px">Ir para o login</a>
      </div>
    </div>
  </div>

<script>
  // Token vem no fragmento (#token=...) — não vaza via Referer.
  var hashParams = new URLSearchParams((window.location.hash || "").replace(/^#/, ""));
  var token = hashParams.get("token");
  if (token) { history.replaceState(null, "", window.location.pathname); }

  var formState = document.getElementById("form-state");
  var successState = document.getElementById("success-state");
  var msgError = document.getElementById("msg-error");
  var submitBtn = document.getElementById("submit-btn");
  var pwInput = document.getElementById("password");
  var pw2Input = document.getElementById("password2");
  var strengthFill = document.getElementById("strength-fill");
  var strengthLabel = document.getElementById("strength-label");

  function getCookie(name) { return document.cookie.split("; ").find(function(r){ return r.indexOf(name + "=") === 0; })?.split("=")[1] || ""; }
  function csrfHeaders(extra) { extra = extra || {}; var c = decodeURIComponent(getCookie("csrf_token") || ""); if (c) extra["X-CSRF-Token"] = c; return extra; }
  function showError(msg) { msgError.textContent = msg; msgError.classList.add("show"); }
  function hideError() { msgError.classList.remove("show"); }

  if (!token) { showError("Link inválido. Verifique o e-mail e clique no link correto."); submitBtn.disabled = true; }

  pwInput.addEventListener("input", function () {
    var pw = pwInput.value, score = 0;
    if (pw.length >= 6) score++;
    if (pw.length >= 10) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    var levels = [
      { pct: "20%", color: "#FF4D4D", label: "Muito fraca" },
      { pct: "40%", color: "#fb923c", label: "Fraca" },
      { pct: "60%", color: "#fbbf24", label: "Razoável" },
      { pct: "80%", color: "#C6F11A", label: "Boa" },
      { pct: "100%", color: "#00F078", label: "Muito forte" },
    ];
    var lvl = levels[Math.max(0, score - 1)] || levels[0];
    if (pw.length === 0) { strengthFill.style.width = "0%"; strengthLabel.textContent = ""; }
    else { strengthFill.style.width = lvl.pct; strengthFill.style.background = lvl.color; strengthLabel.textContent = lvl.label; strengthLabel.style.color = lvl.color; }
  });

  document.getElementById("reset-form").addEventListener("submit", async function (e) {
    e.preventDefault(); hideError();
    var pw = pwInput.value.trim(), pw2 = pw2Input.value.trim();
    if (pw.length < 8) return showError("A senha deve ter pelo menos 8 caracteres.");
    if (pw !== pw2) return showError("As senhas não coincidem.");
    submitBtn.disabled = true; submitBtn.textContent = "Redefinindo…";
    try {
      var res = await fetch("/auth/reset-password", {
        method: "POST", credentials: "same-origin",
        headers: csrfHeaders({ "Content-Type": "application/json" }),
        body: JSON.stringify({ token: token, new_password: pw }),
      });
      var data = await res.json().catch(function(){ return {}; });
      if (!res.ok) throw new Error(data.detail || "Erro ao redefinir senha.");
      formState.style.display = "none";
      successState.style.display = "block";
    } catch (err) {
      showError(err.message); submitBtn.disabled = false; submitBtn.textContent = "Redefinir senha";
    }
  });
</script>
</body>
</html>
