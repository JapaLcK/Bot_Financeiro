<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Redefinir senha — Bot Financeiro</title>
<meta name="theme-color" content="#070b14" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --glass-bg:     rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.13);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.35);
  --radius:       22px;
  --green:  #34d399; --red: #f87171; --blue: #60a5fa;
  --purple: #a78bfa;
  --text:   rgba(255,255,255,0.92);
  --text-2: rgba(255,255,255,0.52);
  --ease:   cubic-bezier(.4,0,.2,1);
}

html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
  background: #070b14; color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  -webkit-font-smoothing: antialiased;
}

/* ─── Ambient orbs ── */
.bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
.orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: .38; animation: drift 18s ease-in-out infinite alternate; }
.orb-1 { width:700px;height:700px;background:radial-gradient(circle,#6d28d9,transparent 70%);top:-250px;left:-200px; }
.orb-2 { width:500px;height:500px;background:radial-gradient(circle,#0ea5e9,transparent 70%);top:30%;right:-200px;animation-delay:-6s; }
.orb-3 { width:450px;height:450px;background:radial-gradient(circle,#ec4899,transparent 70%);bottom:-150px;left:20%;animation-delay:-12s;opacity:.22; }
@keyframes drift { 0%{transform:translate(0,0) scale(1)} 33%{transform:translate(40px,-30px) scale(1.05)} 66%{transform:translate(-20px,50px) scale(.97)} 100%{transform:translate(30px,20px) scale(1.03)} }
body::before { content:""; position:fixed; inset:0; z-index:1; pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); opacity:.6; }

/* ─── Card ── */
.card {
  position: relative; z-index: 2;
  width: 100%; max-width: 420px; margin: 24px;
  background: var(--glass-bg);
  backdrop-filter: blur(32px) saturate(180%);
  -webkit-backdrop-filter: blur(32px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 40px 36px;
  box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,.1);
}

.logo {
  display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
  justify-content: center;
}
.logo-icon {
  width: 42px; height: 42px; border-radius: 12px;
  background: linear-gradient(135deg, #7c3aed, #3b82f6);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.logo-text { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }

h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; text-align: center; }
.subtitle { font-size: 14px; color: var(--text-2); text-align: center; margin-bottom: 28px; line-height: 1.5; }

/* ─── Form ── */
.field { margin-bottom: 16px; }
label { display: block; font-size: 13px; font-weight: 500; color: var(--text-2); margin-bottom: 7px; }
input[type=password], input[type=email] {
  width: 100%; padding: 12px 14px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--glass-border);
  border-radius: 12px; color: var(--text);
  font-size: 15px; outline: none;
  transition: border-color .2s var(--ease), background .2s;
}
input:focus {
  border-color: #7c3aed;
  background: rgba(124,58,237,0.08);
}
input::placeholder { color: rgba(255,255,255,0.25); }

.btn {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, #7c3aed, #3b82f6);
  color: #fff; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: opacity .2s, transform .15s;
  margin-top: 8px;
}
.btn:hover { opacity: .9; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

/* ─── Mensagens ── */
.msg {
  border-radius: 12px; padding: 13px 16px;
  font-size: 14px; line-height: 1.5;
  margin-bottom: 20px; display: none;
}
.msg.error   { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); color: #fca5a5; }
.msg.success { background: rgba(52,211,153,0.12);  border: 1px solid rgba(52,211,153,0.3);  color: #6ee7b7; }
.msg.show { display: block; }

/* ─── Strength bar ── */
.strength { margin-top: 8px; }
.strength-bar {
  height: 4px; border-radius: 4px;
  background: rgba(255,255,255,0.1);
  overflow: hidden; margin-bottom: 4px;
}
.strength-fill {
  height: 100%; width: 0%; border-radius: 4px;
  transition: width .3s var(--ease), background .3s;
}
.strength-label { font-size: 11px; color: var(--text-2); }

/* ─── Link voltar ── */
.back { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-2); text-decoration: none; }
.back:hover { color: var(--text); }

/* ─── Estado de sucesso ── */
.success-state { display: none; text-align: center; }
.success-icon { font-size: 52px; margin-bottom: 16px; }
.success-state h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.success-state p { font-size: 14px; color: var(--text-2); line-height: 1.6; margin-bottom: 24px; }
.success-state .btn { max-width: 220px; margin: 0 auto; display: block; text-decoration: none; text-align: center; }
</style>
</head>
<body>

<div class="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="card">

  <!-- Formulário -->
  <div id="form-state">
    <div class="logo">
      <div class="logo-icon">💸</div>
      <span class="logo-text">Bot Financeiro</span>
    </div>

    <h1>Nova senha</h1>
    <p class="subtitle">Digite sua nova senha abaixo.<br/>O link expira em 30 minutos.</p>

    <div class="msg error" id="msg-error"></div>

    <form id="reset-form">
      <div class="field">
        <label for="password">Nova senha</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required />
        <div class="strength">
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <span class="strength-label" id="strength-label"></span>
        </div>
      </div>
      <div class="field">
        <label for="password2">Confirmar nova senha</label>
        <input type="password" id="password2" placeholder="Repita a senha" autocomplete="new-password" required />
      </div>
      <button type="submit" class="btn" id="submit-btn">Redefinir senha</button>
    </form>

    <a href="/" class="back">← Voltar para o início</a>
  </div>

  <!-- Estado de sucesso -->
  <div class="success-state" id="success-state">
    <div class="success-icon">✅</div>
    <h2>Senha redefinida!</h2>
    <p>Sua senha foi alterada com sucesso.<br/>Agora você pode fazer login com a nova senha.</p>
    <a href="/" class="btn">Ir para o login</a>
  </div>

</div>

<script>
  // ─── Token da URL ─────────────────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const token  = params.get("token");

  const formState    = document.getElementById("form-state");
  const successState = document.getElementById("success-state");
  const msgError     = document.getElementById("msg-error");
  const submitBtn    = document.getElementById("submit-btn");
  const pwInput      = document.getElementById("password");
  const pw2Input     = document.getElementById("password2");
  const strengthFill = document.getElementById("strength-fill");
  const strengthLabel = document.getElementById("strength-label");

  // Token ausente → mostra erro imediatamente
  if (!token) {
    showError("Link inválido. Verifique o e-mail e clique no link correto.");
    submitBtn.disabled = true;
  }

  // ─── Barra de força da senha ──────────────────────────────────────────────
  pwInput.addEventListener("input", () => {
    const pw = pwInput.value;
    let score = 0;
    if (pw.length >= 6)  score++;
    if (pw.length >= 10) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;

    const levels = [
      { pct: "20%",  color: "#f87171", label: "Muito fraca" },
      { pct: "40%",  color: "#fb923c", label: "Fraca"       },
      { pct: "60%",  color: "#fbbf24", label: "Razoável"    },
      { pct: "80%",  color: "#34d399", label: "Boa"         },
      { pct: "100%", color: "#10b981", label: "Muito forte" },
    ];
    const lvl = levels[Math.max(0, score - 1)] || levels[0];
    if (pw.length === 0) {
      strengthFill.style.width = "0%";
      strengthLabel.textContent = "";
    } else {
      strengthFill.style.width = lvl.pct;
      strengthFill.style.background = lvl.color;
      strengthLabel.textContent = lvl.label;
      strengthLabel.style.color = lvl.color;
    }
  });

  // ─── Submit ───────────────────────────────────────────────────────────────
  document.getElementById("reset-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    hideError();

    const pw  = pwInput.value.trim();
    const pw2 = pw2Input.value.trim();

    if (pw.length < 6) {
      return showError("A senha deve ter pelo menos 6 caracteres.");
    }
    if (pw !== pw2) {
      return showError("As senhas não coincidem.");
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Redefinindo...";

    try {
      const res = await fetch("/auth/reset-password", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ token, new_password: pw }),
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.detail || "Erro ao redefinir senha.");
      }

      // sucesso
      formState.style.display    = "none";
      successState.style.display = "block";

    } catch (err) {
      showError(err.message);
      submitBtn.disabled = false;
      submitBtn.textContent = "Redefinir senha";
    }
  });

  function showError(msg) {
    msgError.textContent = msg;
    msgError.classList.add("show");
  }
  function hideError() {
    msgError.classList.remove("show");
  }
</script>
</body>
</html>
