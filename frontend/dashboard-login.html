<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Acessar dashboard — PigBank AI</title>
<meta name="theme-color" content="#070b14" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --glass-bg: rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.13);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.35);
  --radius: 22px;
  --red: #f87171;
  --text: rgba(255,255,255,0.92);
  --text-2: rgba(255,255,255,0.52);
  --ease: cubic-bezier(.4,0,.2,1);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
  background: #070b14; color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  -webkit-font-smoothing: antialiased;
}
.bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
.orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: .38; animation: drift 18s ease-in-out infinite alternate; }
.orb-1 { width:700px;height:700px;background:radial-gradient(circle,#6d28d9,transparent 70%);top:-250px;left:-200px; }
.orb-2 { width:500px;height:500px;background:radial-gradient(circle,#0ea5e9,transparent 70%);top:30%;right:-200px;animation-delay:-6s; }
.orb-3 { width:450px;height:450px;background:radial-gradient(circle,#ec4899,transparent 70%);bottom:-150px;left:20%;animation-delay:-12s;opacity:.22; }
@keyframes drift { 0%{transform:translate(0,0) scale(1)} 33%{transform:translate(40px,-30px) scale(1.05)} 66%{transform:translate(-20px,50px) scale(.97)} 100%{transform:translate(30px,20px) scale(1.03)} }
.card {
  position: relative; z-index: 2;
  width: 100%; max-width: 420px; margin: 24px;
  background: var(--glass-bg);
  backdrop-filter: blur(32px) saturate(180%);
  -webkit-backdrop-filter: blur(32px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 40px 36px;
  box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,.1);
}
.logo { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:28px; }
.logo-icon { width:42px; height:42px; border-radius:12px; background:linear-gradient(135deg, #7c3aed, #3b82f6); display:flex; align-items:center; justify-content:center; font-size:20px; }
.logo-text { font-size:18px; font-weight:700; letter-spacing:-.3px; }
h1 { font-size:22px; font-weight:700; margin-bottom:6px; text-align:center; }
.subtitle { font-size:14px; color: var(--text-2); text-align:center; margin-bottom:28px; line-height:1.5; }
.field { margin-bottom: 16px; }
label { display:block; font-size:13px; font-weight:500; color:var(--text-2); margin-bottom:7px; }
input[type=password], input[type=email] {
  width:100%; padding:12px 14px; background:rgba(255,255,255,0.06);
  border:1px solid var(--glass-border); border-radius:12px; color:var(--text);
  font-size:15px; outline:none; transition:border-color .2s var(--ease), background .2s;
}
input:focus { border-color:#7c3aed; background:rgba(124,58,237,0.08); }
.btn {
  width:100%; padding:13px; background:linear-gradient(135deg, #7c3aed, #3b82f6);
  color:#fff; border:none; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer;
  transition:opacity .2s, transform .15s; margin-top:8px;
}
.btn:hover { opacity:.9; transform:translateY(-1px); }
.btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.msg {
  border-radius:12px; padding:13px 16px; font-size:14px; line-height:1.5; margin-bottom:20px; display:none;
}
.msg.error { background:rgba(248,113,113,0.12); border:1px solid rgba(248,113,113,0.3); color:#fca5a5; }
.msg.show { display:block; }
.back { display:block; text-align:center; margin-top:20px; font-size:13px; color:var(--text-2); text-decoration:none; }
.legal-note {
  margin-top: 14px;
  text-align: center;
  color: var(--text-2);
  font-size: 12px;
  line-height: 1.5;
}
.legal-note a {
  color: rgba(255,255,255,.72);
  text-decoration: none;
  border-bottom: 1px solid rgba(255,255,255,.22);
}
.legal-note a:hover { color: var(--text); border-bottom-color: rgba(255,255,255,.42); }
</style>
</head>
<body>
<div class="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📊</div>
    <span class="logo-text">PigBank AI</span>
  </div>
  <h1>Acessar dashboard</h1>
  <p class="subtitle">Faça login para abrir o dashboard vinculado a este link.<br/>O link expira em 15 minutos.</p>
  <div class="msg error" id="msg-error"></div>
  <form id="login-form">
    <div class="field">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" required />
    </div>
    <div class="field">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="Sua senha" autocomplete="current-password" required />
    </div>
    <button type="submit" class="btn" id="submit-btn">Entrar</button>
  </form>
  <p class="legal-note">
    Ao continuar, você concorda com a
    <a href="/privacy" target="_blank" rel="noopener">Política de Privacidade</a>.
  </p>
  <a href="/" class="back">← Voltar para a página inicial</a>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const dashboardCode = params.get("dashboard_code") || "";
const msgError = document.getElementById("msg-error");
const submitBtn = document.getElementById("submit-btn");

function getCookie(name) {
  return document.cookie.split("; ").find(row => row.startsWith(`${name}=`))?.split("=")[1] || "";
}

function csrfHeaders(extra = {}) {
  const csrf = decodeURIComponent(getCookie("csrf_token") || "");
  return csrf ? { ...extra, "X-CSRF-Token": csrf } : { ...extra };
}

function showError(msg) {
  msgError.textContent = msg;
  msgError.classList.add("show");
}

function hideError() {
  msgError.textContent = "";
  msgError.classList.remove("show");
}

if (!dashboardCode) {
  showError("Link inválido. Solicite um novo link no bot.");
  submitBtn.disabled = true;
}

document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  hideError();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    showError("Preencha e-mail e senha.");
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = "Entrando...";

  try {
    const loginRes = await fetch("/auth/login", {
      method: "POST",
      credentials: "same-origin",
      headers: csrfHeaders({ "Content-Type": "application/json" }),
      body: JSON.stringify({ email, password })
    });
    const loginData = await loginRes.json();
    if (!loginRes.ok) {
      showError(loginData.detail || "E-mail ou senha incorretos.");
      return;
    }

    const linkRes = await fetch("/auth/dashboard-link", {
      method: "POST",
      credentials: "same-origin",
      headers: csrfHeaders({ "Content-Type": "application/json" }),
      body: JSON.stringify({ code: dashboardCode })
    });

    const linkData = await linkRes.json();
    if (!linkRes.ok) {
      showError(linkData.detail || "Nao foi possivel abrir este dashboard.");
      return;
    }

    window.location.href = linkData.dashboard_url || "/app";
  } catch (err) {
    showError(`Erro de conexão. ${err?.message || "Tente novamente."}`);
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = "Entrar";
  }
});
</script>
</body>
</html>
