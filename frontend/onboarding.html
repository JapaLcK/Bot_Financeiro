<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Finalize seu cadastro — PigBank AI</title>
<meta name="theme-color" content="#070b14" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --glass-bg: rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.13);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.35);
  --radius: 22px;
  --red: #f87171;
  --text: rgba(255,255,255,0.92);
  --text-2: rgba(255,255,255,0.52);
  --text-3: rgba(255,255,255,0.35);
  --ease: cubic-bezier(.4,0,.2,1);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
  background: #070b14; color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  -webkit-font-smoothing: antialiased;
}
.bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
.orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: .38; animation: drift 18s ease-in-out infinite alternate; }
.orb-1 { width:700px;height:700px;background:radial-gradient(circle,#6d28d9,transparent 70%);top:-250px;left:-200px; }
.orb-2 { width:500px;height:500px;background:radial-gradient(circle,#0ea5e9,transparent 70%);top:30%;right:-200px;animation-delay:-6s; }
.orb-3 { width:450px;height:450px;background:radial-gradient(circle,#ec4899,transparent 70%);bottom:-150px;left:20%;animation-delay:-12s;opacity:.22; }
@keyframes drift { 0%{transform:translate(0,0) scale(1)} 33%{transform:translate(40px,-30px) scale(1.05)} 66%{transform:translate(-20px,50px) scale(.97)} 100%{transform:translate(30px,20px) scale(1.03)} }
.card {
  position: relative; z-index: 2;
  width: 100%; max-width: 460px; margin: 24px;
  background: var(--glass-bg);
  backdrop-filter: blur(32px) saturate(180%);
  -webkit-backdrop-filter: blur(32px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 40px 36px;
  box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,.1);
}
.logo { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:24px; }
.logo-icon { width:42px; height:42px; border-radius:12px; background:linear-gradient(135deg, #7c3aed, #3b82f6); display:flex; align-items:center; justify-content:center; font-size:20px; }
.logo-text { font-size:18px; font-weight:700; letter-spacing:-.3px; }
h1 { font-size:22px; font-weight:700; margin-bottom:6px; text-align:center; }
.subtitle { font-size:14px; color: var(--text-2); text-align:center; margin-bottom:24px; line-height:1.5; }
.email-pill {
  display:flex; align-items:center; gap:10px;
  padding:10px 14px;
  background:rgba(124,58,237,0.10);
  border:1px solid rgba(124,58,237,0.25);
  border-radius:12px;
  font-size:13px; color:var(--text-2);
  margin-bottom:24px;
}
.email-pill strong { color: var(--text); font-weight:500; word-break:break-all; }
.email-pill svg { flex-shrink:0; }
.field { margin-bottom: 16px; }
label { display:block; font-size:12px; font-weight:600; color:var(--text-2); margin-bottom:7px; letter-spacing:.5px; text-transform:uppercase; }
input[type=text], input[type=tel] {
  width:100%; padding:12px 14px; background:rgba(255,255,255,0.06);
  border:1px solid var(--glass-border); border-radius:12px; color:var(--text);
  font-size:15px; outline:none; transition:border-color .2s var(--ease), background .2s;
}
input:focus { border-color:#7c3aed; background:rgba(124,58,237,0.08); }
.help { font-size:12px; color:var(--text-3); margin-top:6px; line-height:1.5; }
.terms {
  display:flex; align-items:flex-start; gap:10px;
  margin: 14px 0 18px;
  font-size:13px; color:var(--text-2); line-height:1.5;
  cursor:pointer; user-select:none;
}
.terms input[type=checkbox] {
  flex-shrink:0; margin-top:2px; width:16px; height:16px; accent-color:#7c3aed; cursor:pointer;
}
.terms a { color: rgba(255,255,255,.85); border-bottom:1px solid rgba(255,255,255,.25); text-decoration:none; }
.terms a:hover { color: var(--text); border-bottom-color: rgba(255,255,255,.5); }
.btn {
  width:100%; padding:13px; background:linear-gradient(135deg, #7c3aed, #3b82f6);
  color:#fff; border:none; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer;
  transition:opacity .2s, transform .15s;
}
.btn:hover { opacity:.92; transform:translateY(-1px); }
.btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.msg { border-radius:12px; padding:12px 14px; font-size:13.5px; line-height:1.5; margin-bottom:18px; display:none; }
.msg.error { background:rgba(248,113,113,0.12); border:1px solid rgba(248,113,113,0.3); color:#fca5a5; }
.msg.show { display:block; }
.back { display:block; text-align:center; margin-top:18px; font-size:13px; color:var(--text-2); text-decoration:none; }
.back:hover { color: var(--text); }
.skeleton { color: var(--text-3); font-style: italic; }
</style>
</head>
<body>
<div class="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📊</div>
    <span class="logo-text">PigBank AI</span>
  </div>
  <h1>Quase lá!</h1>
  <p class="subtitle">Só precisamos de mais alguns dados pra criar sua conta.</p>

  <div class="email-pill">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
      <polyline points="22,6 12,13 2,6"/>
    </svg>
    <span>Conectado como <strong id="email-display" class="skeleton">carregando...</strong></span>
  </div>

  <div class="msg error" id="msg-error"></div>

  <form id="signup-form">
    <div class="field">
      <label for="name">Nome</label>
      <input type="text" id="name" placeholder="Como podemos te chamar?" autocomplete="given-name" maxlength="50" required />
    </div>
    <div class="field">
      <label for="phone">WhatsApp</label>
      <input type="tel" id="phone" placeholder="(11) 99999-9999" autocomplete="tel" inputmode="tel" required />
      <div class="help">Use o mesmo número de WhatsApp com que você vai falar com o bot.</div>
    </div>

    <label class="terms">
      <input type="checkbox" id="accept-terms" />
      <span>
        Li e aceito a
        <a href="/privacy" target="_blank" rel="noopener">Política de Privacidade</a>
        do PigBank AI.
      </span>
    </label>

    <button type="submit" class="btn" id="submit-btn" disabled>Criar minha conta</button>
  </form>

  <a href="/" class="back">Cancelar</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const signupToken = params.get("token") || "";
const msgError = document.getElementById("msg-error");
const submitBtn = document.getElementById("submit-btn");
const emailDisplay = document.getElementById("email-display");
const nameInput = document.getElementById("name");

function getCookie(name) {
  return document.cookie.split("; ").find(row => row.startsWith(`${name}=`))?.split("=")[1] || "";
}
function csrfHeaders(extra = {}) {
  const csrf = decodeURIComponent(getCookie("csrf_token") || "");
  return csrf ? { ...extra, "X-CSRF-Token": csrf } : { ...extra };
}
function showError(msg) {
  msgError.textContent = msg;
  msgError.classList.add("show");
}
function hideError() {
  msgError.textContent = "";
  msgError.classList.remove("show");
}

async function loadPending() {
  if (!signupToken) {
    showError("Link inválido. Inicie o login com Google novamente.");
    submitBtn.disabled = true;
    emailDisplay.textContent = "—";
    return;
  }
  try {
    const res = await fetch(`/auth/google/pending/${encodeURIComponent(signupToken)}`, {
      credentials: "same-origin"
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      showError(data.detail || "Cadastro expirado. Faça login com Google novamente.");
      submitBtn.disabled = true;
      emailDisplay.textContent = "—";
      return;
    }
    const data = await res.json();
    emailDisplay.textContent = data.email || "—";
    emailDisplay.classList.remove("skeleton");
    if (data.name_hint) nameInput.value = data.name_hint;
  } catch (e) {
    showError("Falha ao carregar dados. Recarregue a página.");
    submitBtn.disabled = true;
  }
}

const acceptCheckbox = document.getElementById("accept-terms");
acceptCheckbox.addEventListener("change", () => {
  submitBtn.disabled = !acceptCheckbox.checked;
});

document.getElementById("signup-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  hideError();

  const name = nameInput.value.trim();
  const phone = document.getElementById("phone").value.trim();
  const accepted = document.getElementById("accept-terms").checked;

  if (name.length < 2) return showError("O nome deve ter pelo menos 2 caracteres.");
  if (!phone) return showError("Informe seu número de WhatsApp.");
  if (!accepted) return showError("Você precisa aceitar a Política de Privacidade pra continuar.");

  submitBtn.disabled = true;
  submitBtn.textContent = "Criando conta...";

  try {
    const res = await fetch("/auth/google/complete-signup", {
      method: "POST",
      credentials: "same-origin",
      headers: csrfHeaders({ "Content-Type": "application/json" }),
      body: JSON.stringify({ token: signupToken, name, phone, accepted_terms: true })
    });
    const data = await res.json();
    if (!res.ok) {
      showError(data.detail || "Não foi possível criar sua conta.");
      submitBtn.disabled = false;
      submitBtn.textContent = "Criar minha conta";
      return;
    }
    window.location.replace(data.dashboard_url || "/home");
  } catch (err) {
    showError(`Erro de conexão. ${err?.message || "Tente novamente."}`);
    submitBtn.disabled = false;
    submitBtn.textContent = "Criar minha conta";
  }
});

loadPending();
</script>
</body>
</html>
