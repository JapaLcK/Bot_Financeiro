<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Finalize seu cadastro — PigBank</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/png" href="/favicon.png" />
<link rel="apple-touch-icon" href="/brand/apple-touch-icon.png" />
<meta name="theme-color" content="#0c0c0d" />
<link rel="stylesheet" href="/brand.css?v=2" />
<link rel="stylesheet" href="/site.css?v=2" />
<style>
  .auth-error { display: none; background: rgba(255,45,45,.1); border: 1px solid rgba(255,45,45,.3); color: #ffb4b4; padding: 10px 13px; border-radius: 10px; font-size: .82rem; margin-bottom: 14px; line-height: 1.4; }
  .auth-error.show { display: block; }
  .email-pill { display: flex; align-items: center; gap: 9px; background: var(--bg-elev); border: 1px solid var(--line-2); border-radius: 12px; padding: 11px 14px; color: var(--ink-2); font-size: .86rem; margin-bottom: 18px; }
  .email-pill svg { color: var(--pink); flex-shrink: 0; }
  .email-pill strong { color: var(--ink); }
  .email-pill .skeleton { color: var(--ink-3); }
  .field .help { font-size: .74rem; color: var(--ink-3); margin-top: 6px; }
  .back { display: inline-block; text-align: center; width: 100%; color: var(--ink-3); font-size: .84rem; margin-top: 16px; }
  .back:hover { color: var(--pink); }
</style>
</head>
<body>
<div class="glow"></div>

  <nav class="nav">
    <a class="nav-logo" href="/"><img class="logo-badge" src="/brand/avatar.webp" alt="" /><span>PigBank</span></a>
    <div class="nav-right"><a class="link-entrar" href="/login">Entrar</a></div>
  </nav>

  <div class="wrap auth-wrap">
    <div class="auth-card">
      <img src="/brand/mascot.webp" alt="" style="width:120px;height:auto;display:block;margin:0 auto 6px;filter:drop-shadow(0 8px 22px rgba(0,0,0,.45))" />
      <h1>Quase lá!</h1>
      <p class="auth-sub">Só precisamos de mais alguns dados pra criar sua conta.</p>

      <div class="email-pill">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <span>Conectado como <strong id="email-display" class="skeleton">carregando…</strong></span>
      </div>

      <div class="auth-error" id="msg-error"></div>

      <form id="signup-form">
        <div class="field">
          <label for="name">Nome</label>
          <input type="text" id="name" placeholder="Como podemos te chamar?" autocomplete="given-name" maxlength="50" required />
        </div>
        <div class="field">
          <label for="phone">WhatsApp</label>
          <input type="tel" id="phone" placeholder="(11) 99999-9999" autocomplete="tel" inputmode="tel" required />
          <div class="help">Use o mesmo número de WhatsApp com que você vai falar com a Piggy.</div>
        </div>
        <label class="checkbox-row">
          <input type="checkbox" id="accept-terms" />
          <span>Li e aceito os <a href="/termos" target="_blank" rel="noopener" style="color:var(--pink)">Termos</a> e a <a href="/privacy" target="_blank" rel="noopener" style="color:var(--pink)">Política de Privacidade</a> do PigBank.</span>
        </label>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn" disabled>Criar minha conta</button>
      </form>

      <a href="/" class="back">Cancelar</a>
    </div>
  </div>

<script>
const params = new URLSearchParams(window.location.search);
const signupToken = params.get("token") || "";
const msgError = document.getElementById("msg-error");
const submitBtn = document.getElementById("submit-btn");
const emailDisplay = document.getElementById("email-display");
const nameInput = document.getElementById("name");

function getCookie(name) { return document.cookie.split("; ").find(function(r){ return r.indexOf(name + "=") === 0; })?.split("=")[1] || ""; }
function csrfHeaders(extra) { extra = extra || {}; var c = decodeURIComponent(getCookie("csrf_token") || ""); if (c) extra["X-CSRF-Token"] = c; return extra; }
function showError(msg) { msgError.textContent = msg; msgError.classList.add("show"); }
function hideError() { msgError.textContent = ""; msgError.classList.remove("show"); }

async function loadPending() {
  if (!signupToken) { showError("Link inválido. Inicie o login com Google novamente."); submitBtn.disabled = true; emailDisplay.textContent = "—"; return; }
  try {
    const res = await fetch("/auth/google/pending/" + encodeURIComponent(signupToken), { credentials: "same-origin" });
    if (!res.ok) {
      const data = await res.json().catch(function(){ return {}; });
      showError(data.detail || "Cadastro expirado. Faça login com Google novamente.");
      submitBtn.disabled = true; emailDisplay.textContent = "—"; return;
    }
    const data = await res.json();
    emailDisplay.textContent = data.email || "—";
    emailDisplay.classList.remove("skeleton");
    if (data.name_hint) nameInput.value = data.name_hint;
  } catch (e) { showError("Falha ao carregar dados. Recarregue a página."); submitBtn.disabled = true; }
}

const acceptCheckbox = document.getElementById("accept-terms");
acceptCheckbox.addEventListener("change", function () { submitBtn.disabled = !acceptCheckbox.checked; });

document.getElementById("signup-form").addEventListener("submit", async function (e) {
  e.preventDefault(); hideError();
  const name = nameInput.value.trim();
  const phone = document.getElementById("phone").value.trim();
  const accepted = document.getElementById("accept-terms").checked;
  if (name.length < 2) return showError("O nome deve ter pelo menos 2 caracteres.");
  if (!phone) return showError("Informe seu número de WhatsApp.");
  if (!accepted) return showError("Você precisa aceitar os termos pra continuar.");
  submitBtn.disabled = true; submitBtn.textContent = "Criando conta…";
  try {
    const res = await fetch("/auth/google/complete-signup", {
      method: "POST", credentials: "same-origin",
      headers: csrfHeaders({ "Content-Type": "application/json" }),
      body: JSON.stringify({ token: signupToken, name: name, phone: phone, accepted_terms: true })
    });
    const data = await res.json().catch(function(){ return {}; });
    if (!res.ok) { showError(data.detail || "Não foi possível criar sua conta."); submitBtn.disabled = false; submitBtn.textContent = "Criar minha conta"; return; }
    window.location.replace(data.dashboard_url || "/home");
  } catch (err) { showError("Erro de conexão. Tente novamente."); submitBtn.disabled = false; submitBtn.textContent = "Criar minha conta"; }
});

loadPending();
</script>
</body>
</html>
